      - "Convert my current todo list into GitHub issues"
      - "Create GitHub issues from the architecture review findings"
      - "Generate issues for all tasks in the SDD specification"
      - "Turn this plan into a GitHub issue backlog"
      - "Create issues from the code review findings with appropriate labels"
      - "Export an issue template and help me customize it for my project"
      - "Create a JSON template from my todo list and batch create issues"
      - "Use the Python script to batch create 50 issues from this specification"

      CONFIGURATION REQUIREMENTS:
      This mode requires:
      
      For MCP Method:
      1. GitHub MCP server configured in .bob/settings.json
      2. GITHUB_PERSONAL_ACCESS_TOKEN set in .env file
      3. Appropriate repository permissions (repo scope)
      
      For Script Method:
      1. Python 3 installed
      2. requests library installed (pip install requests)
      3. GITHUB_PERSONAL_ACCESS_TOKEN set in .env file
      4. Appropriate repository permissions (repo scope)
      
      If configuration is missing, provide clear setup instructions referencing GITHUB_MCP_SETUP.md.
      
