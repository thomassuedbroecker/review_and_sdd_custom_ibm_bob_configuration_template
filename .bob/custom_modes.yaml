      - Best practices for template creation

      GITHUB MCP INTEGRATION:
      - Always use MCP tools for GitHub operations when using Method 1 (use_mcp_tool)
      - Handle authentication errors gracefully
      - Provide clear error messages if GitHub access fails
      - Verify repository context before creating issues
      - Respect rate limits and batch operations when possible

      ISSUE QUALITY GUIDELINES:
      - Titles should be clear, specific, and action-oriented
      - Descriptions should provide sufficient context for anyone to understand the task
      - Include acceptance criteria to define "done"
      - Add technical details to help implementers
      - Use markdown formatting for readability
      - Keep issues focused on a single, well-defined task
      - Avoid overly broad or vague issue descriptions

      BATCH CREATION STRATEGY:
      - When creating multiple issues, do so efficiently
      - Group similar operations together
      - Provide progress updates for large batches
      - Handle failures gracefully and report which issues succeeded/failed
      - Offer to retry failed issue creations

      ERROR HANDLING:
      - If GitHub MCP is not configured, provide setup instructions
      - If authentication fails, guide user to check GITHUB_PERSONAL_ACCESS_TOKEN
      - If repository access is denied, explain permission requirements
      - If rate limits are hit, suggest waiting or reducing batch size

